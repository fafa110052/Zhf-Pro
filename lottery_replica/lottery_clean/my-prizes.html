<!DOCTYPE HTML>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta content="width=device-width,initial-scale=1.0, maximum-scale=1.0,minimum-scale=1.0" name="viewport" />
    <meta content="yes" name="apple-mobile-web-app-capable" />
    <meta content="black" name="apple-mobile-web-app-status-bar-style" />
    <title>我的奖品 - 住好房</title>
    <link type="text/css" rel="stylesheet" href="css/style_gk.css" />
    <style>
        html { background: #0a0a0a; }
        body {
            margin: 0 auto;
            padding: 0;
            max-width: 450px;
            font-family: "微软雅黑";
            background: #1a1a2e;
            color: #fff;
            min-height: 100dvh;
            -webkit-overflow-scrolling: touch;
        }
        .page {
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100dvh;
            padding-bottom: 40px;
        }

        /* ─── 头部 ─── */
        .header {
            display: flex;
            align-items: center;
            padding: 12px 16px 0;
            position: relative;
        }
        .back-btn {
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            color: #f3ddb5; font-size: 22px; text-decoration: none; flex-shrink: 0;
        }
        .header-title {
            flex: 1; text-align: center;
            font-size: 18px; font-weight: bold; color: #FFE500;
            margin-right: 32px;
        }

        /* ─── Tab栏 ─── */
        .tabs {
            display: flex;
            margin: 20px 16px 0;
            background: rgba(255,255,255,0.06);
            border-radius: 10px;
            overflow: hidden;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            font-size: 14px;
            color: #aaa;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .tab.active {
            color: #FFE500;
            font-weight: bold;
            background: rgba(255,229,0,0.1);
        }

        /* ─── 内容区 ─── */
        .tab-content {
            display: none;
            padding: 20px 16px;
        }
        .tab-content.active {
            display: block;
        }

        /* ─── 奖品卡片 ─── */
        .prize-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .prize-thumb {
            width: 72px; height: 72px;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            flex-shrink: 0;
            object-fit: cover;
        }
        .prize-info {
            flex: 1;
            min-width: 0;
        }
        .prize-name {
            font-size: 15px; font-weight: bold; color: #fff;
            margin-bottom: 4px;
        }
        .prize-meta {
            font-size: 12px; color: #999;
            line-height: 1.6;
        }
        .prize-action {
            flex-shrink: 0;
        }
        .btn-call {
            display: inline-block;
            padding: 8px 16px;
            background: #FFE500;
            color: #1a1a2e;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            text-decoration: none;
        }
        .btn-call.expired {
            background: rgba(255,255,255,0.1);
            color: #666;
        }

        /* ─── 空态 ─── */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }
        .empty-icon {
            font-size: 56px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        .empty-text {
            font-size: 15px; color: #888;
            margin-bottom: 8px;
        }
        .empty-hint {
            font-size: 13px; color: #666;
        }

        /* ─── 客服条 ─── */
        .service-bar {
            position: fixed;
            bottom: 0; left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 450px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px 16px;
            background: rgba(26,26,46,0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.08);
            box-sizing: border-box;
        }
        .service-text {
            font-size: 13px; color: #aaa;
        }
        .service-phone {
            font-size: 15px; color: #FFE500; font-weight: bold;
        }
    </style>
</head>
<div class="page">
    <!-- 头部 -->
    <div class="header">
        <a href="index.html" class="back-btn">&#8592;</a>
        <div class="header-title">我的奖品</div>
    </div>

    <!-- Tab栏 -->
    <div class="tabs">
        <div class="tab active" onclick="switchTab(0)">&#127873; 未领奖</div>
        <div class="tab" onclick="switchTab(1)">&#9989; 已领奖</div>
        <div class="tab" onclick="switchTab(2)">&#9203; 已失效</div>
    </div>

    <!-- 未领奖 -->
    <div class="tab-content active" id="tab-0">
        <!-- 示例卡片（连后端后动态渲染） -->
        <div class="empty-state">
            <div class="empty-icon">&#127873;</div>
            <div class="empty-text">暂无未领取的奖品</div>
            <div class="empty-hint">快去摇一摇抽奖吧！</div>
        </div>
    </div>

    <!-- 已领奖 -->
    <div class="tab-content" id="tab-1">
        <div class="empty-state">
            <div class="empty-icon">&#128203;</div>
            <div class="empty-text">暂无已领取记录</div>
            <div class="empty-hint">中奖后请前往门店领取</div>
        </div>
    </div>

    <!-- 已失效 -->
    <div class="tab-content" id="tab-2">
        <div class="empty-state">
            <div class="empty-icon">&#9203;</div>
            <div class="empty-text">暂无已失效奖品</div>
            <div class="empty-hint">奖品有效期24小时，记得及时领取哦</div>
        </div>
    </div>
</div>

<!-- 底部客服条 -->
<div class="service-bar">
    <span class="service-text">领奖咨询：</span>
    <a href="tel:【你的客服电话】" style="text-decoration:none;">
        <span class="service-phone">【你的客服电话】</span>
    </a>
</div>

<script type="text/javascript" src="js/jquery-1.11.1.min.js"></script>
<script type="text/javascript" src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
<script>
function switchTab(idx) {
    document.querySelectorAll('.tab').forEach(function(t, i) {
        t.classList.toggle('active', i === idx);
    });
    document.querySelectorAll('.tab-content').forEach(function(c, i) {
        c.classList.toggle('active', i === idx);
    });
}

// 微信 JS-SDK 分享配置
var wxSignatureUrl = '/api/v1/lottery/wx-signature?url=' + encodeURIComponent(window.location.href.split('#')[0]);
$.getJSON(wxSignatureUrl, function(res) {
    if (!res.success || !res.data) {
        console.error('[wx] 获取签名失败:', res);
        return;
    }
    var sig = res.data;

    wx.config({
        debug: false,
        appId: sig.appId,
        timestamp: sig.timestamp,
        nonceStr: sig.nonceStr,
        signature: sig.signature,
        jsApiList: ['onMenuShareTimeline', 'onMenuShareAppMessage', 'updateAppMessageShareData', 'updateTimelineShareData']
    });

    wx.ready(function() {
        var shareData = {
            title: '住好房"摇一摇"有惊喜 — 我的奖品',
            desc: '看看我中了什么奖品！你也来摇一摇吧！',
            link: window.location.href.split('#')[0],
            imgUrl: 'https://wzzhfservice.cloud/lottery/images/content_share_logo.jpg'
        };
        wx.updateAppMessageShareData && wx.updateAppMessageShareData(shareData);
        wx.updateTimelineShareData && wx.updateTimelineShareData(shareData);
        wx.onMenuShareTimeline && wx.onMenuShareTimeline(shareData);
        wx.onMenuShareAppMessage && wx.onMenuShareAppMessage(shareData);
    });
}).fail(function(err) {
    console.error('[wx] 签名接口请求失败:', err);
});
</script>
</body>
</html>
